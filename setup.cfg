[isort]
multi_line_output=3
include_trailing_comma=True
force_grid_wrap=0
use_parentheses=True
line_length=88

[flake8]
ignore = E203, E266, E501, W503
max-line-length = 88
max-complexity = 18
select = B,C,E,F,W,T4
exclude =
    .venv,
    __pycache__,
    .git

[mypy]
files=*.py,**/*.py
ignore_missing_imports=true

[tool:pytest]
testpaths=test

[coverage:run]
source = python_repo_template

[coverage:report]
exclude_lines =
    # Standard method of skipping a line of code.
    pragma: no cover

    # Exclude debug-only code.
    def __repr__
    if self\.debug

    # Don't complain if tests come across defensive assertion code.
    raise AssertionError
    raise NotImplementedError

    # Don't complain if non-runnable code isn't run:
    if 0:
    if __name__== .__main__.: